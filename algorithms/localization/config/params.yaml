localization_node:
  ros__parameters:
    input_odom_topic: "/ego_racecar/odom"
    output_odom_topic: "/localization/odom"
    output_pose_topic: "/localization/pose"

map_server_node:
  ros__parameters:
    map_yaml: "/sim_ws/src/localization/maps/map.yaml"
    map_topic: "/map"
    frame_id: "map"
    publish_rate: 1.0

imu_odometry_node:
  ros__parameters:
    odom_topic: "/ego_racecar/odom"
    imu_topic: "/imu/data"
    output_topic: "/localization/odom_fused"
    alpha: 0.5
    gyro_bias_samples: 100

particle_filter_node:
  ros__parameters:
    map_topic: "/map"
    scan_topic: "/scan"
    odom_topic: "/ego_racecar/odom"
    output_odom_topic: "/localization/odom"
    output_pose_topic: "/localization/pose"
    particle_cloud_topic: "/localization/particles"
    frame_id: "map"

    num_particles: 500
    downsample_beams: 20
    max_range: 10.0

    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.05
    alpha4: 0.05

    z_hit: 0.8
    z_rand: 0.2
    sigma_hit: 0.15

    initial_spread_xy: 0.5
    initial_spread_theta: 0.3
